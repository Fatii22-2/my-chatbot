<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chatbot TP 5 - Digital Marketing</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="chat-container">
        <div class="chat-header">
            <h2>Assistant Marketing Digital</h2>
        </div>
        <div id="chat-box" class="chat-box">
            <div class="message bot-message">Bonjour ! Comment puis-je vous aider aujourd'hui ?</div>
        </div>
        <div class="chat-input">
            <input type="text" id="user-input" placeholder="Posez votre question...">
            <button id="send-btn">Envoyer</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>index.html
